# if one selected, terminate -> severity: ER, department: ER
# order doesn't matter
- qid: emer_critical_001
  text: หมดสติ เรียกไม่รู้สึกตัว ไม่หายใจ
- qid: emer_critical_002
  text: ชักเกร็ง
- qid: emer_critical_003
  text: ซึม หรือสับสน
- qid: emer_critical_004  # only for age < 18
  text: ปวดหัวรุนแรง
- qid: emer_critical_005
  text: อาการวิงเวียนศีรษะไม่ดีขึ้น หรือเดินเซ ทรงตัวไม่ได้อย่างรุนแรง
- qid: emer_critical_006
  text: อาการตามัว หรือมองไม่เห็น หรือมีภาพซ้อน
- qid: emer_critical_007
  text: มีอาการหน้าเบี้ยว หรือปากเบี้ยว
- qid: emer_critical_008
  text: มีอาการแขน หรือขาอ่อนแรงเฉียบพลัน
- qid: emer_critical_009
  text: มีอาการลิ้นแข็ง หรือพูดไม่ออก พูดไม่ชัด หรือพูดจาสับสน
- qid: emer_critical_010
  text: หายใจเหนื่อยหอบ หรือหายใจไม่ออก หรือหายใจลำบากจนพูดได้ประโยคสั้นๆ
- qid: emer_critical_011
  text: มีหายใจเฮือก หรือมีหยุดหายใจ หรือมีประวัติสำลักที่ทำให้หายใจไม่ออก
- qid: emer_critical_012
  text: มีเลือดหรือเสมหะปริมาณมากในปาก หายใจเสียงดังโครกคราก
- qid: emer_critical_013
  text: เจ็บแน่นหน้าอก เหมือนมีอะไรมาทับ หรืออาจร้าวไปที่กราม หรือแขนซ้าย
- qid: emer_critical_014
  text: ตัวเขียว ซีด หน้ามืด เป็นลม หมดสติชั่ววูบ
- qid: emer_critical_015
  text: มีอาการผื่น หน้าบวม ตาบวม หรือริมฝีปากบวมหลังรับประทานอาหารหรือยา ที่สงสัยว่าแพ้
- qid: emer_critical_016
  text: มีเลือดออกเป็นจำนวนมาก เช่น ไอเป็นเลือด ถ่ายเป็นเลือด อาเจียนเป็นเลือด
- qid: emer_critical_017
  text: ได้รับสารพิษ สารเคมี หรือถูกสัตว์มีพิษร้ายแรงกัด (เช่น งู, ตะขาบ เป็นต้น)
- qid: emer_critical_018
  text: อุบัติเหตุรุนแรง ที่มีเลือดออกมาก เลือดไหลไม่หยุด
- qid: emer_critical_019
  text: หลังเพิ่งประสบอุบัติเหตุแล้ว มีอาการผิดปกติ เช่น ปวดท้องรุนแรง ปวดหัวรุนแรง หรือมีอาการผิดรูปของอวัยวะ หรือซึม
- qid: emer_critical_020 # only if pregnant
  text: เลือดออกทางช่องคลอดมาก ลูกดิ้นลดลง ปวดท้องรุนแรง น้ำคร่ำเดิน