# red/orange
# red = department: ER, severity: ER
# orange = department: ??, severity: >=Visit Hospital
Headache:
  - qid: emer_adult_hea001
    text: แขนขาอ่อนแรง ชา หน้าเบี้ยว พูดไม่ชัด ตาพร่ามัว มองเห็นภาพซ้อน เดินเซ บ้านหมุนรุนแรง
  - qid: emer_adult_hea002
    text: สับสน มึนงงมาก เป็นลม ง่วงซึมปลุกยาก หรือ ชัก หรือหมดสติ
  - qid: emer_adult_hea003
    text: ปวดแบบฟ้าผ่า / ปวดรุนแรง กระสับกระส่าย / ปวดมาก (ตั้งแต่ 7 คะแนนขึ้นไปจาก 10 คะแนน)
  - qid: emer_adult_hea004
    text: ปวดศีรษะรุนแรงและฉับพลันภายในเวลาไม่กี่วินาที
  - qid: emer_adult_hea005
    text: ปวดศีรษะใหม่ที่รุนแรงมาก หลังออกแรง/ไอ/เบ่ง/มีเพศสัมพันธ์
  - qid: emer_adult_hea006
    text: ตั้งครรภ์มากกว่า 20 สัปดาห์ หรือหลังคลอดไม่เกิน 6 สัปดาห์ และมีปวดศีรษะรุนแรง หรือ ตามัว/เห็นแสงวาบ/ปวดลิ้นปี่/บวมมาก หรือทราบว่าความดันสูง
  - qid: emer_adult_hea007
    text: ปวดตาอย่างรุนแรง ตาแดง ตาพร่ามัว เห็นรุ้งรอบดวงไฟ คลื่นไส้อาเจียน และ ปวดศีรษะ
  - qid: emer_adult_hea008
    text: ไข้ร่วมกับ คอแข็ง หรือปวดศีรษะรุนแรงร่วมกับไข้
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004
  - qid: emer_adult_hea009
    text: มีผื่นร่วมกับไข้และปวดศีรษะรุนแรง
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004
  - qid: emer_adult_hea010
    text: ภูมิคุ้มกันต่ำ/กินยากดภูมิ/มะเร็ง/HIV หรือเพิ่งติดเชื้อรุนแรงแล้วมีปวดศีรษะใหม่
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004
  - qid: emer_adult_hea011
    text: ปวดศีรษะหลัง ศีรษะกระแทก/อุบัติเหตุ (โดยเฉพาะคลื่นไส้อาเจียนมากขึ้น/ปวดมากขึ้น)
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004
  - qid: emer_adult_hea012
    text: กินยาละลายลิ่มเลือด/ยาต้านการแข็งตัวของเลือด แล้วปวดศีรษะรุนแรงใหม่
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004
  - qid: emer_adult_hea013
    text: อาการปวดศีรษะมากจนตื่น โดยเฉพาะช่วงเช้า หรือขณะนอนหลับ
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004
  - qid: emer_adult_hea014
    text: อายุมากกว่า 50 ปี และ ปวดศีรษะรูปแบบใหม่ หรือรุนแรง/ถี่ขึ้นอย่างชัดเจนในช่วงสั้นๆ
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004

Dizziness:
  - qid: emer_adult_diz001
    text: บ้านหมุน มีอาการเดินเซ ทรงตัวไม่ได้อย่างรุนแรง
  - qid: emer_adult_diz002
    text: มีอาการหน้าเบี้ยว แขนขาอ่อนแรง พูดไม่ชัด
  - qid: emer_adult_diz003
    text: ชัก สับสน พฤติกรรมเปลี่ยนเฉียบพลัน
  - qid: emer_adult_diz004
    text: หมดสติ / เป็นลม / ซึมลง
  - qid: emer_adult_diz005
    text: เจ็บหน้าอก แน่นหน้าอก หายใจลำบาก
  - qid: emer_adult_diz006
    text: หน้ามืดคล้ายจะเป็นลม เจ็บหน้าอก ใจสั่น หรือเหนื่อยง่ายร่วมด้วย
  - qid: emer_adult_diz007
    text: ตั้งครรภ์/มีปวดศีรษะ ตาพร่ามัว หรือการมองเห็นเปลี่ยนแปลงไป
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept005
  - qid: emer_adult_diz008
    text: เวียนศีรษะหลังเกิดอุบัติเหตุศีรษะ
    min_severity:
      id: sev002_5
    department:
      - id: dept002

Pain in Joint:
  - qid: emer_adult_pai001
    text: ปวดข้อรุนแรง กระสับกระส่าย ปวดมาก (ตั้งแต่ 7 คะแนนขึ้นไปจาก 10 คะแนน)
  - qid: emer_adult_pai002
    text: ไม่สามารถลงน้ำหนัก หรือใช้แขน/ขาข้างนั้นได้
    min_severity:
      id: sev003
    department:
      - id: dept002
      - id: dept007
  - qid: emer_adult_pai003
    text: มีอุบัติเหตุเกิดขึ้นก่อนปวดข้อ (ล้มแรง รถชน ข้อผิดรูป)
  - qid: emer_adult_pai004
    text: มี ไข้ ร่วมกับข้อบวม แดง หรือร้อน
    min_severity:
      id: sev002_5
    department:
      - id: dept004
      - id: dept007

Muscle Pain:
  - qid: emer_adult_mus001
    text: ปวดกล้ามเนื้อรุนแรงมาก กระสับกระส่าย ปวดมาก (ตั้งแต่ 7 คะแนนขึ้นไปจาก 10 คะแนน)
  - qid: emer_adult_mus002
    text: ปวดปลายแขนหรือขารุนแรง ร่วมกับมีอาการปลายแขนหรือขาเย็น ซีด
  - qid: emer_adult_mus003
    text: อ่อนแรงมากทันที ขยับแขนขาไม่ได้ หรือ กลั้นปัสสาวะ/อุจจาระไม่ได้
  - qid: emer_adult_mus004
    text: มีอุบัติเหตุรุนแรง เช่น รถชน ตกจากที่สูง แผลลึก หรือได้รับบาดเจ็บมาก เช่น มีแขนขาผิดรูป
  - qid: emer_adult_mus005
    text: มีไข้สูง ซึมลง สับสน ร่วมกับปวดกล้ามเนื้อ 
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004
  - qid: emer_adult_mus006
    text: อาการกล้ามเนื้อบวมเร็ว ปวดเมื่อยรุนแรง และปัสสาวะสีเข้มคล้ายสีโค้กหรือน้ำชา
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004

Fever:
  - qid: emer_adult_fev001
    text: ซึมลง /เพ้อ สับสน /ตอบไม่รู้เรื่อง
  - qid: emer_adult_fev002
    text: วูบ/หมดสติ/ซีดตัวเย็น
  - qid: emer_adult_fev003
    text: หายใจลำบาก/เหนื่อยหอบ/เจ็บแน่นหน้าอก
  - qid: emer_adult_fev004
    text: ชักครั้งแรก/ชักร่วมกับไข้ (โดยเฉพาะชักนาน/ชักซ้ำ)
  - qid: emer_adult_fev005
    text: เสมหะปริมาณมากในปาก หายใจเสียงดังโครกคราก
  - qid: emer_adult_fev006
    text: ปวดท้องรุนแรง หรือปวดมาก (ตั้งแต่ 7 คะแนนขึ้นไปจาก 10 คะแนน) และปวดต่อเนื่อง
  - qid: emer_adult_fev007
    text: ปวดศีรษะรุนแรงร่วมกับคอแข็ง
  - qid: emer_adult_fev008
    text: ภูมิคุ้มกันต่ำ/สงสัยเม็ดเลือดขาวต่ำ (เช่น ได้รับเคมีบำบัดภายใน 7-14 วัน) และมีไข้
    min_severity:
      id: sev002_5
    department:
      - id: dept004
  - qid: emer_adult_fev009
    text: เดินทางกลับจากพื้นที่เสี่ยง (เช่น เขตมาลาเรีย/ไข้เลือดออก/โรคระบาด) ภายใน 1 เดือน หรือมีอาการป่วยหลังเดินทาง
    min_severity:
      id: sev002_5
    department:
      - id: dept004
  - qid: emer_adult_fev010
    text: ไม่ได้ฉีดวัคซีนตามเกณฑ์/ไม่ทราบสถานะวัคซีน (โดยเฉพาะเด็ก) ร่วมกับอาการไม่สบายมาก
    min_severity:
      id: sev002_5
    department:
      - id: dept004

Cough:
  - qid: emer_adult_cou001
    text: หายใจเหนื่อยหอบ หายใจไม่ออก พูดได้ประโยคสั้นๆ
  - qid: emer_adult_cou002
    text: มีเลือดหรือเสมหะปริมาณมากในปาก หายใจเสียงดังโครกคราก
  - qid: emer_adult_cou003
    text: ปาก/หน้าเขียวคล้ำ 
  - qid: emer_adult_cou004
    text: ซึม สับสน เป็นลม หรือรู้สึกตัวเปลี่ยนไป
  - qid: emer_adult_cou005
    text: เจ็บหน้าอก (เจ็บมาก/เจ็บเวลาไอหรือหายใจ) 
  - qid: emer_adult_cou006
    text: ไอเป็นเลือด/อาเจียนเป็นเลือด/มีเลือดปนเสมหะชัดเจน
  - qid: emer_adult_cou007
    text: ไข้สูงร่วม อ่อนเพลียมาก กินได้น้อย
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004

Sore Throat:
  - qid: emer_adult_sor001
    text: หายใจเหนื่อยหอบ หายใจไม่ออก พูดได้ประโยคสั้นๆ หายใจมีเสียงดังหวีด
  - qid: emer_adult_sor002
    text: ซึมมาก สับสน หรือรู้สึกตัวเปลี่ยนไป
  - qid: emer_adult_sor003
    text: กลืนไม่ได้แม้แต่น้ำลาย / น้ำลายไหลตลอด / กลืนลำบากมากขึ้นเรื่อย ๆ
  - qid: emer_adult_sor004
    text: เสียงเปลี่ยนมาก (เสียงอู้อี้/เสียงก้อง “อมของร้อน”) หรือพูดลำบากชัดเจน
  - qid: emer_adult_sor005
    text: ปวดคอ/คอบวมมาก หรือคอแข็งมากผิดปกติ
  - qid: emer_adult_sor006
    text: อ้าปากได้น้อย หรือลำบาก / ขากรรไกรแข็งเกร็ง
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept008
  - qid: emer_adult_sor007
    text: ไข้สูง หนาวสั่น กินได้น้อย อ่อนเพลีย 
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004

Stomachache:
  - qid: emer_adult_abd001
    text: หน้ามืด เป็นลม เหงื่อแตก ตัวเย็น ซึมลง
  - qid: emer_adult_abd002
    text: หายใจเหนื่อยหอบ หายใจไม่ออก พูดได้ประโยคสั้นๆ 
  - qid: emer_adult_abd003
    text: ปวดท้องจุกเสียด แน่นบริเวณยอดอกหรือลิ้นปี่ และ/หรือ แน่นหน้าอก 
  - qid: emer_adult_abd004
    text: ปวดท้องรุนแรงมากปวดจนงอตัว/ทนไม่ได้ กระสับกระส่าย (ปวดมากตั้งแต่ 7 คะแนนขึ้นไปจาก 10 คะแนน)  
  - qid: emer_adult_abd005
    text: ปวดท้องรุนแรงและร้าวทะลุไปด้านหลัง
  - qid: emer_adult_abd006
    text: อาเจียนต่อเนื่อง กิน/ดื่มไม่ได้ หรืออาเจียนเป็นเลือด
  - qid: emer_adult_abd007
    text: ถ่ายเป็นเลือดปริมาณมาก ร่วมกับปวดท้อง
  - qid: emer_adult_abd008
    text: ตั้งครรภ์ และมีปวดท้องรุนแรง หรือมี เลือดออกทางช่องคลอดระหว่างตั้งครรภ์
  - qid: emer_adult_abd009
    text: มีปวดอัณฑะ/ถุงอัณฑะรุนแรงหรือเฉียบพลัน 
  - qid: emer_adult_abd010
    text: ไข้สูง ร่วมกับปวดท้อง หรืออาการทรุดเร็ว
    min_severity:
      id: sev002_5
    department:
      - id: dept002
  - qid: emer_adult_abd011
    text: มีภาวะภูมิคุ้มกันต่ำ + มีไข้/หนาวสั่น หรืออาการดูรุนแรงผิดปกติ
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004
  - qid: emer_adult_abd012
    text: มีถ่ายอุจจาระมีเลือดสดปน หรือถ่ายดำ (สีเหมือนยางมะตอย)
    min_severity:
      id: sev002_5
    department:
      - id: dept002

Constipation:
  - qid: emer_adult_con001
    text: ปวดท้องรุนแรง (ตั้งแต่ 7 คะแนนขึ้นไปจาก 10 คะแนน) หรือปวดมากขึ้นเรื่อยๆ
