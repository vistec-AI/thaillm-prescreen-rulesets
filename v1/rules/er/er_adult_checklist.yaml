    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept012
  - qid: emer_adult_con005
    text: ไม่ถ่าย และไม่ผายลมร่วมกับปวดท้อง/อาเจียน
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept012

Diarrhea:
  - qid: emer_adult_dia001
    text: อาการขาดน้ำ เช่น ปัสสาวะลดลง หน้ามืด เวียนศีรษะมาก สับสน อ่อนเพลียมาก ซึมลง
  - qid: emer_adult_dia002
    text: ปวดท้องรุนแรง กระสับกระส่าย ปวดมาก (ตั้งแต่ 7 คะแนนขึ้นไปจาก 10 คะแนน) / ปวดมากขึ้นเรื่อย ๆ
  - qid: emer_adult_dia003
