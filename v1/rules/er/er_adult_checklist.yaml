      - id: dept004

Dysuria:
  - qid: emer_adult_dys001
    text: สับสน หน้ามืด เป็นลม หมดสติ
  - qid: emer_adult_dys002
    text: ปวดท้องรุนแรง กระสับกระส่าย ปวดมาก (ตั้งแต่ 7 คะแนนขึ้นไปจาก 10 คะแนน) / ปวดมากขึ้นเรื่อย ๆ
  - qid: emer_adult_dys003
    text: อาเจียนมาก กิน/ดื่มไม่ได้ หรือปัสสาวะน้อยลง
  - qid: emer_adult_dys004
    text: ไข้สูง/หนาวสั่น ร่วมกับปวดสีข้าง/ปวดหลังส่วนบน
    min_severity:
      id: sev002_5
    department:
      - id: dept002
      - id: dept004

Vaginal Discharge:
  - qid: emer_adult_vag001
    text: ปวดท้องน้อย/ปวดเชิงกรานรุนแรง กระสับกระส่าย ปวดมาก (ตั้งแต่ 7 คะแนนขึ้นไปจาก 10 คะแนน)
  - qid: emer_adult_vag002
    text: เลือดออกทางช่องคลอดมาก
