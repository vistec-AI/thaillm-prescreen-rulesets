      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_dys010
    text: "มีประวัติค่าการทำงานไตสูง (ครีเอตินินสูง) หรือมีความดันโลหิตสูง"
    severity:
      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_dys011
    text: "มีตกขาว/หรือหนองสีเหลือง ออกจากช่องคลอดหรืออวัยวะเพศ"
    severity:
      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_dys012
    text: "มีแผลที่อวัยวะเพศ หรือมีผื่นร่วมกับไข้"
    severity:
      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_dys013
    text: "สงสัยว่าตัวเองอาจตั้งครรภ์ หรือประจำเดือนขาด"
