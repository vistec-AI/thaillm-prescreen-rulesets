    severity:
      id: sev002_5
    department:
      - id: dept006
  - qid: emer_ped_eye013
    text: "มีเลือดออกในดวงตา"
    severity:
      id: sev002_5
    department:
      - id: dept006
  - qid: emer_ped_eye014
