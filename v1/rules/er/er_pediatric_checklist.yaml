    text: "อายุเด็กน้อยกว่า 6 เดือน"
    severity:
      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_dia007
    text: "เวียนหัวหน้ามืดเวลาเปลี่ยนท่า/ยืน หรือเป็นลม"
