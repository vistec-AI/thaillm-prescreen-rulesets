      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_dia008
    text: "อาเจียนหลายครั้ง กิน/ดื่มไม่ได้ หรือมีอาการปวดท้องรุนแรง/ต่อเนื่อง"
    severity:
      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_dia009
    text: "มีไข้สูง หรือไข้ร่วมกับหนาวสั่น"
    severity:
      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_dia010
    text: "วันนี้ถ่ายเหลวตั้งแต่ 10 ครั้งขึ้นไป"
