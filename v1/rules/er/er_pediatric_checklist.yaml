    department:
      - id: dept012

Diarrhea:
  - qid: emer_ped_dia001
    text: "ดูซึมลง ปลุกไม่ค่อยตื่น หรือหมดแรง"
  - qid: emer_ped_dia002
    text: "ปากแห้ง มือเท้าเย็น เหงื่อออก ตัวซีด/เขียวคล้ำ หรือร้องแล้วไม่มีน้ำตา"
  - qid: emer_ped_dia003
    text: "ปัสสาวะน้อยมากหรือไม่ปัสสาวะเลยใน 6–8 ชั่วโมง"
  - qid: emer_ped_dia004
    text: "หายใจหอบลึก หรือหายใจเร็วผิดปกติ"
  - qid: emer_ped_dia005
