      id: sev002_5
    department:
      - id: dept006
  - qid: emer_ped_eye015
    text: "มีตากระตุกผิดปกติ"
    severity:
      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_eye016
    text: "มีประวัติบาดเจ็บดวงตาจากวัตถุมีคม หรือสารเคมีเข้าตา"
    severity:
      id: sev002_5
    department:
      - id: dept006

"Ear Disorder":
  - qid: emer_ped_ear001
    text: "มีเลือดออกจากหู (โดยเฉพาะหลังอุบัติเหตุ/กระแทกศีรษะ)"
