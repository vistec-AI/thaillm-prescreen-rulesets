      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_con006
    text: "มีปวดท้องรุนแรง หรืออาการปวดท้องแย่ลง"
    severity:
      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_con007
    text: "มีท้องอืดมาก หรือหน้าท้องโป่งพองผิดปกติ"
    severity:
      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_con008
    text: "มีคลื่นไส้ หรืออาเจียนร่วมด้วย โดยเฉพาะอาเจียนมีสีเขียวหรือสีเหลืองปน"
    severity:
      id: sev002_5
    department:
