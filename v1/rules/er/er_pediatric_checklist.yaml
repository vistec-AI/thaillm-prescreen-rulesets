      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_dia011
    text: "ท้องเสียเป็นนานเกิน 14 วัน"
    severity:
      id: sev002_5
    department:
      - id: dept009
  - qid: emer_ped_dia012
    text: "น้ำหนักลด เบื่ออาหาร หรือโตช้ากว่าปกติ"
    severity:
      id: sev002_5
    department:
      - id: dept009

Dysuria:
